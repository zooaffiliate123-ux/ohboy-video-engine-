name: Render Video and Upload to YouTube

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: 'WordPress Post ID'
        required: true
      title:
        description: 'Video Title'
        required: true
      source:
        description: 'News Source'
        required: true
      topic:
        description: 'News Topic'
        required: true
      sentence1:
        description: 'Sentence 1'
        required: false
      sentence2:
        description: 'Sentence 2'
        required: false
      sentence3:
        description: 'Sentence 3'
        required: false
      sentence4:
        description: 'Sentence 4'
        required: false
      sentence5:
        description: 'Sentence 5'
        required: false
      sentence6:
        description: 'Sentence 6'
        required: false
      image_url:
        description: 'Background Image URL'
        required: false
      callback_url:
        description: 'WordPress callback URL'
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick python3 fonts-dejavu-core wget curl
          echo "Done!"

      - name: Fix ImageMagick policy
        run: |
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/rights="none" pattern="EPS"/rights="read|write" pattern="EPS"/' /etc/ImageMagick-6/policy.xml || true
          echo "Policy fixed!"

      - name: Download music and background image
        run: |
          mkdir -p /tmp/audio /tmp/bg

          # ============================================================
          # MUSIC - Download free lofi music from pixabay (no copyright)
          # ============================================================
          echo "Downloading background music..."
          
          # Try multiple free music sources
          MUSIC_OK=false
          
          # Source 1: Free music archive
          curl -s -L --max-time 30 \
            -A "Mozilla/5.0" \
            -o /tmp/audio/bg_music.mp3 \
            "https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Kai_Engel/Satin/Kai_Engel_-_04_-_Sentinel.mp3" 2>/dev/null
          
          MSIZE=$(stat -c%s /tmp/audio/bg_music.mp3 2>/dev/null || echo 0)
          echo "Music source 1: $MSIZE bytes"
          
          if [ "$MSIZE" -gt 10000 ]; then
            MUSIC_OK=true
            echo "Music ready from source 1!"
          fi

          # Source 2: Another free source
          if [ "$MUSIC_OK" = false ]; then
            curl -s -L --max-time 30 \
              -A "Mozilla/5.0" \
              -o /tmp/audio/bg_music.mp3 \
              "https://www.bensound.com/bensound-music/bensound-relaxing.mp3" 2>/dev/null
            MSIZE=$(stat -c%s /tmp/audio/bg_music.mp3 2>/dev/null || echo 0)
            echo "Music source 2: $MSIZE bytes"
            if [ "$MSIZE" -gt 10000 ]; then
              MUSIC_OK=true
              echo "Music ready from source 2!"
            fi
          fi

          # Source 3: Generate with ffmpeg if all downloads fail
          if [ "$MUSIC_OK" = false ]; then
            echo "Generating music with ffmpeg..."
            ffmpeg -y -f lavfi \
              -i "anoisesrc=c=pink:r=44100:a=0.05" \
              -f lavfi \
              -i "aevalsrc=0.08*sin(110*2*PI*t)+0.06*sin(220*2*PI*t)+0.04*sin(330*2*PI*t):s=44100" \
              -filter_complex "amix=inputs=2:duration=shortest,afade=t=in:st=0:d=3,afade=t=out:st=30:d=5,volume=0.4,lowpass=f=800" \
              -t 35 \
              /tmp/audio/bg_music.mp3 -y 2>/dev/null
            MUSIC_OK=true
            echo "Generated music ready!"
          fi

          echo "Final music size: $(stat -c%s /tmp/audio/bg_music.mp3) bytes"

      - name: Create video frames
        run: |
          mkdir -p /tmp/frames /tmp/output

          # Clean inputs - remove unicode and special chars
          TITLE=$(echo "${{ github.event.inputs.title }}" | iconv -f utf-8 -t ascii//TRANSLIT 2>/dev/null || echo "${{ github.event.inputs.title }}")
          SOURCE=$(echo "${{ github.event.inputs.source }}" | iconv -f utf-8 -t ascii//TRANSLIT 2>/dev/null || echo "${{ github.event.inputs.source }}")
          TOPIC="${{ github.event.inputs.topic }}"
          IMAGE_URL="${{ github.event.inputs.image_url }}"
          TODAY=$(date '+%b %d, %Y')

          FONT_BOLD="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          FONT_REG="/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf"

          case "$TOPIC" in
            "Breaking News") ACCENT="#c8102e" DARK="#0d0508" ;;
            "Politics") ACCENT="#1a5fb4" DARK="#080d1a" ;;
            "Entertainment") ACCENT="#9141ac" DARK="#0d080f" ;;
            "Sports") ACCENT="#26a269" DARK="#05120a" ;;
            "Technology") ACCENT="#1c71d8" DARK="#080d1a" ;;
            "Business") ACCENT="#e5a50a" DARK="#120e02" ;;
            "World") ACCENT="#c64600" DARK="#120800" ;;
            *) ACCENT="#c8102e" DARK="#0d0508" ;;
          esac

          echo "Title: $TITLE"
          echo "Topic: $TOPIC | Accent: $ACCENT"

          # ============================================================
          # DOWNLOAD BACKGROUND IMAGE - 3 methods
          # ============================================================
          BG_OK=false

          # Method 1: RSS image
          if [ -n "$IMAGE_URL" ]; then
            echo "Trying RSS image..."
            curl -s -L --max-time 60 --retry 3 \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36" \
              -H "Accept: image/webp,image/apng,image/*,*/*;q=0.8" \
              -H "Referer: https://www.google.com/" \
              -o /tmp/bg_raw.jpg "$IMAGE_URL" 2>/dev/null
            FSIZE=$(stat -c%s /tmp/bg_raw.jpg 2>/dev/null || echo 0)
            echo "RSS image: $FSIZE bytes"
            if [ "$FSIZE" -gt 5000 ]; then
              convert /tmp/bg_raw.jpg \
                -resize 720x1280^ -gravity Center -extent 720x1280 \
                /tmp/bg_ready.jpg 2>/dev/null && BG_OK=true
              echo "RSS image ready!"
            fi
          fi

          # Method 2: Pollinations AI image
          if [ "$BG_OK" = false ]; then
            echo "Trying Pollinations AI image..."
            CLEAN=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9 ]/ /g' | tr ' ' '+' | sed 's/+\+/+/g' | cut -c1-60)
            PURL="https://image.pollinations.ai/prompt/news+photo+${CLEAN}+professional+dramatic?width=720&height=1280&nologo=true&seed=123"
            echo "Pollinations URL: $PURL"
            curl -s -L --max-time 60 --retry 2 \
              -A "Mozilla/5.0" \
              -o /tmp/bg_raw.jpg "$PURL" 2>/dev/null
            FSIZE=$(stat -c%s /tmp/bg_raw.jpg 2>/dev/null || echo 0)
            echo "AI image: $FSIZE bytes"
            if [ "$FSIZE" -gt 5000 ]; then
              convert /tmp/bg_raw.jpg \
                -resize 720x1280^ -gravity Center -extent 720x1280 \
                /tmp/bg_ready.jpg 2>/dev/null && BG_OK=true
              echo "AI image ready!"
            fi
          fi

          # Method 3: Gradient fallback
          if [ "$BG_OK" = false ]; then
            echo "Using gradient..."
            convert -size 720x1280 gradient:"${ACCENT}"-"${DARK}" /tmp/bg_ready.jpg
            BG_OK=true
          fi

          echo "Background ready: $BG_OK"

          # ============================================================
          # SLIDE 1 - HEADLINE with image
          # ============================================================
          echo "Creating slide 1..."

          # Apply dark gradient only at bottom so image is visible at top
          convert /tmp/bg_ready.jpg \
            \( -size 720x1280 gradient:none-"rgba(0,0,0,0.97)" \) \
            -composite \
            /tmp/slide1_base.jpg

          # Top branding bar
          convert /tmp/slide1_base.jpg \
            -fill "rgba(0,0,0,0.8)" -draw "rectangle 0,0 720,85" \
            -font "$FONT_BOLD" -pointsize 30 \
            -fill "#ffffff" -draw "text 20,55 'OH BOY NEWS'" \
            /tmp/slide1_base.jpg

          # Topic badge
          BLEN=${#TOPIC}
          BADGE_W=$((BLEN * 16 + 40))
          TOPIC_UP=$(echo "$TOPIC" | tr '[:lower:]' '[:upper:]')
          convert /tmp/slide1_base.jpg \
            -fill "$ACCENT" \
            -draw "roundrectangle 40,760 $((40+BADGE_W)),805 8,8" \
            -font "$FONT_BOLD" -pointsize 21 \
            -fill "#ffffff" \
            -draw "text 55,789 '$TOPIC_UP'" \
            /tmp/slide1_base.jpg

          # Headline text
          convert -background none \
            -fill "#ffffff" -font "$FONT_BOLD" -pointsize 44 \
            -gravity NorthWest -size 640x300 \
            caption:"$TITLE" \
            /tmp/title_text.png

          convert /tmp/slide1_base.jpg \
            /tmp/title_text.png -geometry +40+818 -composite \
            /tmp/slide1_base.jpg

          # Source + hint
          convert /tmp/slide1_base.jpg \
            -font "$FONT_REG" -pointsize 23 \
            -fill "#cccccc" -draw "text 40,1178 '$SOURCE  -  $TODAY'" \
            -fill "#999999" -pointsize 20 \
            -draw "text 40,1222 'Swipe up for full story >'" \
            /tmp/frames/frame_01.jpg

          echo "Slide 1: $(stat -c%s /tmp/frames/frame_01.jpg) bytes"

          # ============================================================
          # SENTENCES - clean unicode
          # ============================================================
          clean_text() {
            echo "$1" | iconv -f utf-8 -t ascii//TRANSLIT 2>/dev/null | sed "s/['\`]//g"
          }

          S1=$(clean_text "${{ github.event.inputs.sentence1 }}")
          S2=$(clean_text "${{ github.event.inputs.sentence2 }}")
          S3=$(clean_text "${{ github.event.inputs.sentence3 }}")
          S4=$(clean_text "${{ github.event.inputs.sentence4 }}")
          S5=$(clean_text "${{ github.event.inputs.sentence5 }}")
          S6=$(clean_text "${{ github.event.inputs.sentence6 }}")

          LABELS=("WHAT HAPPENED" "KEY DETAIL" "MORE DETAILS" "WHY IT MATTERS" "REACTION" "WHATS NEXT")
          FALLBACKS=(
            "This story is developing. More details emerging from $SOURCE."
            "According to $SOURCE this is one of the most important stories right now."
            "Multiple outlets have confirmed the key facts of this report."
            "The story has significant implications for global audiences."
            "Reactions from officials and the public are now coming in."
            "Further developments expected in the coming hours."
          )
          SENTENCES=("$S1" "$S2" "$S3" "$S4" "$S5" "$S6")

          # ============================================================
          # SLIDES 2-7 - Dark background + white text
          # ============================================================
          for i in 0 1 2 3 4 5; do
            SLIDE_NUM=$((i + 2))
            LABEL="${LABELS[$i]}"
            TEXT="${SENTENCES[$i]}"
            if [ -z "$TEXT" ]; then TEXT="${FALLBACKS[$i]}"; fi
            PROGRESS=$(( (i + 1) * 720 / 7 ))
            FNAME="frame_0${SLIDE_NUM}.jpg"
            echo "Creating slide $SLIDE_NUM: $LABEL"

            # Dark base
            convert -size 720x1280 xc:"#0d0d0d" /tmp/slide_base.jpg

            # Accent bar top + nav
            convert /tmp/slide_base.jpg \
              -fill "$ACCENT" -draw "rectangle 0,0 720,6" \
              -fill "rgba(0,0,0,0.95)" -draw "rectangle 0,0 720,80" \
              -font "$FONT_BOLD" -pointsize 28 \
              -fill "#ffffff" -draw "text 20,52 'OH BOY NEWS'" \
              -font "$FONT_REG" -pointsize 22 \
              -fill "#888888" -draw "text 575,52 '${SLIDE_NUM}/8'" \
              /tmp/slide_base.jpg

            # Label badge
            LLEN=${#LABEL}
            LBADGE_W=$((LLEN * 14 + 30))
            convert /tmp/slide_base.jpg \
              -fill "$ACCENT" \
              -draw "roundrectangle 40,105 $((40+LBADGE_W)),150 6,6" \
              -font "$FONT_BOLD" -pointsize 20 \
              -fill "#ffffff" -draw "text 55,138 '$LABEL'" \
              -fill "$ACCENT" -draw "rectangle 40,165 160,171" \
              /tmp/slide_base.jpg

            # Body text - white
            convert -background none \
              -fill "#ffffff" -font "$FONT_REG" -pointsize 38 \
              -gravity NorthWest -size 640x900 \
              caption:"$TEXT" \
              /tmp/body_text.png

            convert /tmp/slide_base.jpg \
              /tmp/body_text.png -geometry +40+185 -composite \
              /tmp/slide_base.jpg

            # Bottom bar + source + progress
            convert /tmp/slide_base.jpg \
              -fill "rgba(0,0,0,0.95)" -draw "rectangle 0,1215 720,1280" \
              -font "$FONT_REG" -pointsize 20 \
              -fill "#888888" -draw "text 40,1248 '$SOURCE'" \
              -fill "#333333" -draw "rectangle 0,1272 720,1278" \
              -fill "$ACCENT" -draw "rectangle 0,1272 ${PROGRESS},1278" \
              /tmp/frames/$FNAME

            echo "Slide $SLIDE_NUM: $(stat -c%s /tmp/frames/$FNAME) bytes"
          done

          # ============================================================
          # SLIDE 8 - CTA with image background
          # ============================================================
          echo "Creating slide 8..."
          convert /tmp/bg_ready.jpg \
            -fill "rgba(0,0,0,0.72)" -draw "rectangle 0,0 720,1280" \
            /tmp/slide8_base.jpg

          # OH BOY NEWS big text
          convert -background none \
            -fill "#ffffff" -font "$FONT_BOLD" -pointsize 85 \
            -gravity Center -size 680x220 \
            caption:"OH BOY NEWS" \
            /tmp/cta_title.png

          convert /tmp/slide8_base.jpg \
            /tmp/cta_title.png -gravity Center -geometry +0-200 -composite \
            /tmp/slide8_base.jpg

          # Subscribe text
          convert -background none \
            -fill "#ffffff" -font "$FONT_REG" -pointsize 34 \
            -gravity Center -size 680x100 \
            caption:"SUBSCRIBE for daily breaking news!" \
            /tmp/cta_sub.png

          convert /tmp/slide8_base.jpg \
            /tmp/cta_sub.png -gravity Center -geometry +0+50 -composite \
            /tmp/slide8_base.jpg

          # Hashtags
          convert /tmp/slide8_base.jpg \
            -font "$FONT_REG" -pointsize 24 \
            -fill "rgba(255,255,255,0.7)" \
            -gravity Center \
            -annotate +0+190 "#Shorts #BreakingNews #News" \
            /tmp/frames/frame_08.jpg

          echo "Slide 8: $(stat -c%s /tmp/frames/frame_08.jpg) bytes"
          echo "ALL FRAMES:"
          ls -lh /tmp/frames/

      - name: Create MP4 with music
        run: |
          > /tmp/frames.txt
          echo "file '/tmp/frames/frame_01.jpg'" >> /tmp/frames.txt
          echo "duration 3" >> /tmp/frames.txt
          for i in 2 3 4 5 6 7 8; do
            echo "file '/tmp/frames/frame_0${i}.jpg'" >> /tmp/frames.txt
            echo "duration 3" >> /tmp/frames.txt
          done
          echo "file '/tmp/frames/frame_08.jpg'" >> /tmp/frames.txt

          MSIZE=$(stat -c%s /tmp/audio/bg_music.mp3 2>/dev/null || echo 0)
          echo "Music size: $MSIZE bytes"

          if [ "$MSIZE" -gt 10000 ]; then
            echo "Creating video WITH music..."
            ffmpeg -y \
              -f concat -safe 0 -i /tmp/frames.txt \
              -stream_loop -1 -i /tmp/audio/bg_music.mp3 \
              -vf "scale=720:1280:force_original_aspect_ratio=decrease,pad=720:1280:(ow-iw)/2:(oh-ih)/2:black,setsar=1,fps=25" \
              -c:v libx264 -preset fast -crf 22 -pix_fmt yuv420p \
              -c:a aac -b:a 128k \
              -af "volume=0.4,afade=t=out:st=21:d=3" \
              -shortest \
              -movflags +faststart \
              /tmp/output/video.mp4
          else
            echo "Creating video WITHOUT music..."
            ffmpeg -y \
              -f concat -safe 0 -i /tmp/frames.txt \
              -vf "scale=720:1280:force_original_aspect_ratio=decrease,pad=720:1280:(ow-iw)/2:(oh-ih)/2:black,setsar=1,fps=25" \
              -c:v libx264 -preset fast -crf 22 -pix_fmt yuv420p \
              -movflags +faststart \
              /tmp/output/video.mp4
          fi

          echo "Video ready:"
          ls -lh /tmp/output/video.mp4

      - name: Get YouTube Access Token
        id: yt_token
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.YT_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.YT_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.YT_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          ACCESS_TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERROR: No token! Response: $RESPONSE"
            exit 1
          fi
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT
          echo "Got YouTube token!"

      - name: Upload to YouTube
        id: yt_upload
        run: |
          ACCESS_TOKEN="${{ steps.yt_token.outputs.access_token }}"
          TITLE="${{ github.event.inputs.title }}"
          VIDEO_PATH="/tmp/output/video.mp4"
          VIDEO_SIZE=$(stat -c%s "$VIDEO_PATH")
          YT_TITLE="${TITLE:0:90} #Shorts"

          cat > /tmp/metadata.json << METAEOF
          {
            "snippet": {
              "title": "$YT_TITLE",
              "description": "$TITLE\n\nSubscribe for daily breaking news!\n\n#Shorts #BreakingNews #News #OHBOYNews",
              "tags": ["Shorts", "Breaking News", "News", "OH BOY News"],
              "categoryId": "25"
            },
            "status": {
              "privacyStatus": "public",
              "selfDeclaredMadeForKids": false
            }
          }
          METAEOF

          curl -s -D /tmp/headers.txt -X POST \
            "https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json; charset=UTF-8" \
            -H "X-Upload-Content-Type: video/mp4" \
            -H "X-Upload-Content-Length: $VIDEO_SIZE" \
            -d @/tmp/metadata.json

          UPLOAD_URL=$(grep -i "^location:" /tmp/headers.txt | tr -d '\r\n' | sed 's/[Ll]ocation: //')
          if [ -z "$UPLOAD_URL" ]; then
            echo "No upload URL!"
            cat /tmp/headers.txt
            exit 1
          fi

          RESULT=$(curl -s -X PUT "$UPLOAD_URL" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: video/mp4" \
            -H "Content-Length: $VIDEO_SIZE" \
            --data-binary @"$VIDEO_PATH")

          VIDEO_ID=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
          if [ -z "$VIDEO_ID" ]; then
            echo "Upload failed! $RESULT"
            exit 1
          fi

          echo "video_id=$VIDEO_ID" >> $GITHUB_OUTPUT
          echo "yt_url=https://www.youtube.com/shorts/$VIDEO_ID" >> $GITHUB_OUTPUT
          echo "SUCCESS! https://www.youtube.com/shorts/$VIDEO_ID"

      - name: Notify WordPress success
        if: success()
        run: |
          curl -s -X POST "${{ github.event.inputs.callback_url }}" \
            -d "post_id=${{ github.event.inputs.post_id }}" \
            -d "video_id=${{ steps.yt_upload.outputs.video_id }}" \
            -d "yt_url=${{ steps.yt_upload.outputs.yt_url }}" \
            -d "status=success"
          echo "WordPress notified!"

      - name: Notify WordPress failure
        if: failure()
        run: |
          curl -s -X POST "${{ github.event.inputs.callback_url }}" \
            -d "post_id=${{ github.event.inputs.post_id }}" \
            -d "status=failed"
          echo "WordPress notified - failed!"
