name: Render Video and Upload to YouTube

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: 'WordPress Post ID'
        required: true
      title:
        description: 'Video Title'
        required: true
      source:
        description: 'News Source'
        required: true
      topic:
        description: 'News Topic'
        required: true
      sentence1:
        description: 'Sentence 1'
        required: false
      sentence2:
        description: 'Sentence 2'
        required: false
      sentence3:
        description: 'Sentence 3'
        required: false
      sentence4:
        description: 'Sentence 4'
        required: false
      sentence5:
        description: 'Sentence 5'
        required: false
      sentence6:
        description: 'Sentence 6'
        required: false
      image_url:
        description: 'Background Image URL'
        required: false
      callback_url:
        description: 'WordPress callback URL'
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3 python3-pip
          pip3 install Pillow requests --quiet
          echo "Done!"

      - name: Generate background music
        run: |
          mkdir -p /tmp/audio
          ffmpeg -y -f lavfi \
            -i "aevalsrc=0.1*sin(110*2*PI*t)+0.07*sin(165*2*PI*t)+0.05*sin(220*2*PI*t):s=44100" \
            -t 35 \
            -af "afade=t=in:st=0:d=4,afade=t=out:st=31:d=4,volume=0.35,lowpass=f=600" \
            /tmp/audio/bg_music.mp3 2>/dev/null
          echo "Music: $(stat -c%s /tmp/audio/bg_music.mp3) bytes"

      - name: Create video frames with Python
        env:
          TITLE: ${{ github.event.inputs.title }}
          SOURCE: ${{ github.event.inputs.source }}
          TOPIC: ${{ github.event.inputs.topic }}
          IMAGE_URL: ${{ github.event.inputs.image_url }}
          SENTENCE1: ${{ github.event.inputs.sentence1 }}
          SENTENCE2: ${{ github.event.inputs.sentence2 }}
          SENTENCE3: ${{ github.event.inputs.sentence3 }}
          SENTENCE4: ${{ github.event.inputs.sentence4 }}
          SENTENCE5: ${{ github.event.inputs.sentence5 }}
          SENTENCE6: ${{ github.event.inputs.sentence6 }}
        run: |
          python3 << 'PYEOF'
          import os, sys, requests, unicodedata, html, re
          from PIL import Image, ImageDraw, ImageFont
          from io import BytesIO

          W, H = 720, 1280
          os.makedirs('/tmp/frames', exist_ok=True)
          os.makedirs('/tmp/output', exist_ok=True)

          def clean_text(text):
              if not text:
                  return ''
              # Fix HTML entities like &#8217; &#8216; etc
              text = html.unescape(text)
              # Normalize unicode
              text = unicodedata.normalize('NFKD', text)
              # Replace smart quotes
              text = text.replace('\u2019', "'").replace('\u2018', "'")
              text = text.replace('\u201c', '"').replace('\u201d', '"')
              text = text.replace('\u2013', '-').replace('\u2014', '-')
              text = text.replace('\u2026', '...')
              # Remove non-ASCII except common punctuation
              result = ''
              for c in text:
                  if ord(c) < 128:
                      result += c
                  else:
                      result += ' '
              return ' '.join(result.split())

          TITLE    = clean_text(os.environ.get('TITLE', 'Breaking News'))
          SOURCE   = clean_text(os.environ.get('SOURCE', 'OH BOY NEWS'))
          TOPIC    = clean_text(os.environ.get('TOPIC', 'Breaking News'))
          IMAGE_URL = os.environ.get('IMAGE_URL', '')
          SENTENCES = [clean_text(os.environ.get(f'SENTENCE{i}', '')) for i in range(1, 7)]

          print(f"Title: {TITLE}")
          print(f"Topic: {TOPIC}")
          print(f"Sentences: {SENTENCES}")

          # Colors
          COLORS = {
              'Breaking News': ('#c8102e', '#0d0508'),
              'Politics':      ('#1a5fb4', '#080d1a'),
              'Entertainment': ('#9141ac', '#0d080f'),
              'Sports':        ('#26a269', '#05120a'),
              'Technology':    ('#1c71d8', '#080d1a'),
              'Business':      ('#c8a000', '#120e02'),
              'World':         ('#c64600', '#120800'),
          }
          accent_hex, dark_hex = COLORS.get(TOPIC, ('#c8102e', '#0d0508'))

          def hex_to_rgb(h):
              h = h.lstrip('#')
              return tuple(int(h[i:i+2], 16) for i in (0, 2, 4))

          ACCENT   = hex_to_rgb(accent_hex)
          DARK     = hex_to_rgb(dark_hex)
          WHITE    = (255, 255, 255)
          GRAY     = (160, 160, 160)
          DARK_BG  = (13, 13, 13)

          # Fonts
          try:
              FB52 = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf', 52)
              FB42 = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf', 42)
              FB36 = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf', 36)
              FB28 = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf', 28)
              FB22 = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf', 22)
              FR40 = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf', 40)
              FR28 = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf', 28)
              FR22 = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf', 22)
              FR18 = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf', 18)
              print("Fonts loaded!")
          except Exception as e:
              print(f"Font error: {e}")
              FB52 = FB42 = FB36 = FB28 = FB22 = FR40 = FR28 = FR22 = FR18 = ImageFont.load_default()

          def draw_rounded_rect(draw, xy, radius, fill):
              x1, y1, x2, y2 = xy
              draw.rectangle([x1+radius, y1, x2-radius, y2], fill=fill)
              draw.rectangle([x1, y1+radius, x2, y2-radius], fill=fill)
              draw.ellipse([x1, y1, x1+radius*2, y1+radius*2], fill=fill)
              draw.ellipse([x2-radius*2, y1, x2, y1+radius*2], fill=fill)
              draw.ellipse([x1, y2-radius*2, x1+radius*2, y2], fill=fill)
              draw.ellipse([x2-radius*2, y2-radius*2, x2, y2], fill=fill)

          def wrap_text(text, font, max_width, draw):
              words = text.split()
              lines, current = [], ''
              for word in words:
                  test = (current + ' ' + word).strip()
                  bbox = draw.textbbox((0, 0), test, font=font)
                  if bbox[2] - bbox[0] <= max_width:
                      current = test
                  else:
                      if current:
                          lines.append(current)
                      current = word
              if current:
                  lines.append(current)
              return lines

          def draw_centered_text(draw, y, text, font, fill, max_width=W-80):
              bbox = draw.textbbox((0, 0), text, font=font)
              tw = bbox[2] - bbox[0]
              x = (W - min(tw, max_width)) // 2
              draw.text((x, y), text, font=font, fill=fill)
              return bbox[3] - bbox[1]

          def draw_centered_multiline(draw, y, lines, font, fill, line_height):
              for line in lines:
                  bbox = draw.textbbox((0, 0), line, font=font)
                  tw = bbox[2] - bbox[0]
                  x = (W - tw) // 2
                  # Shadow
                  draw.text((x+2, y+2), line, font=font, fill=(0, 0, 0))
                  draw.text((x, y), line, font=font, fill=fill)
                  y += line_height
              return y

          # ============================================================
          # DOWNLOAD BACKGROUND IMAGE
          # ============================================================
          bg_image = None

          if IMAGE_URL:
              print(f"Downloading image: {IMAGE_URL}")
              try:
                  headers = {
                      'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0',
                      'Accept': 'image/webp,image/apng,image/*,*/*;q=0.8',
                      'Referer': 'https://www.google.com/',
                  }
                  r = requests.get(IMAGE_URL, headers=headers, timeout=30)
                  if r.status_code == 200 and len(r.content) > 5000:
                      img = Image.open(BytesIO(r.content)).convert('RGB')
                      ratio = img.width / img.height
                      target = W / H
                      if ratio > target:
                          nw, nh = int(H * ratio), H
                      else:
                          nw, nh = W, int(W / ratio)
                      img = img.resize((nw, nh), Image.LANCZOS)
                      left = (nw - W) // 2
                      top  = (nh - H) // 2
                      img  = img.crop((left, top, left + W, top + H))
                      bg_image = img
                      print(f"RSS image ready!")
              except Exception as e:
                  print(f"RSS image failed: {e}")

          if bg_image is None:
              print("Trying Pollinations AI...")
              try:
                  clean_title = re.sub(r'[^a-z0-9 ]', ' ', TITLE[:60].lower())
                  prompt = '+'.join(clean_title.split())
                  url = f"https://image.pollinations.ai/prompt/news+photo+{prompt}+professional+dramatic?width=720&height=1280&nologo=true&seed=42"
                  r = requests.get(url, timeout=60, headers={'User-Agent': 'Mozilla/5.0'})
                  if r.status_code == 200 and len(r.content) > 5000:
                      img = Image.open(BytesIO(r.content)).convert('RGB')
                      img = img.resize((W, H), Image.LANCZOS)
                      bg_image = img
                      print("AI image ready!")
              except Exception as e:
                  print(f"Pollinations failed: {e}")

          if bg_image is None:
              print("Using gradient...")
              bg_image = Image.new('RGB', (W, H))
              draw_temp = ImageDraw.Draw(bg_image)
              for y in range(H):
                  ratio = y / H
                  r = int(ACCENT[0]*(1-ratio) + DARK[0]*ratio)
                  g = int(ACCENT[1]*(1-ratio) + DARK[1]*ratio)
                  b = int(ACCENT[2]*(1-ratio) + DARK[2]*ratio)
                  draw_temp.line([(0,y),(W,y)], fill=(r,g,b))

          def make_slide_with_bg(text_lines_data, slide_num, label=None):
              """
              Creates a slide with bg image + dark overlay
              text_lines_data: list of (text, font, color, y_offset)
              """
              img = bg_image.copy()
              # Full dark overlay - image visible but text readable
              overlay = Image.new('RGBA', (W, H), (0, 0, 0, 0))
              od = ImageDraw.Draw(overlay)
              for y in range(H):
                  ratio = y / H
                  if slide_num == 1:
                      # Slide 1: top clear, bottom dark
                      if ratio < 0.3:
                          alpha = 20
                      elif ratio < 0.55:
                          alpha = int(20 + (ratio - 0.3)/0.25 * 160)
                      else:
                          alpha = 180
                  else:
                      # Other slides: darker overall so text readable
                      alpha = int(200 + ratio * 30)
                      alpha = min(alpha, 230)
                  od.line([(0,y),(W,y)], fill=(0,0,0,alpha))
              img = img.convert('RGBA')
              img = Image.alpha_composite(img, overlay)
              img = img.convert('RGB')
              return img

          import datetime
          TODAY = datetime.date.today().strftime('%b %d, %Y')

          # ============================================================
          # SLIDE 1 - HEADLINE
          # ============================================================
          print("Creating slide 1...")
          img1 = make_slide_with_bg([], 1)
          d1 = ImageDraw.Draw(img1)

          # Top bar
          d1.rectangle([0, 0, W, 85], fill=(0, 0, 0, 200))
          bbox = d1.textbbox((0,0), 'OH BOY NEWS', font=FB28)
          d1.text(((W - bbox[2] + bbox[0])//2, 26), 'OH BOY NEWS', font=FB28, fill=WHITE)

          # Topic badge - centered
          topic_up = TOPIC.upper()
          bbox = d1.textbbox((0,0), topic_up, font=FB22)
          bw = bbox[2] - bbox[0] + 40
          bx = (W - bw) // 2
          draw_rounded_rect(d1, [bx, 760, bx+bw, 808], 8, ACCENT)
          d1.text((bx+20, 772), topic_up, font=FB22, fill=WHITE)

          # Accent line
          d1.rectangle([(W-120)//2, 818, (W+120)//2, 824], fill=ACCENT)

          # Headline - centered
          title_lines = wrap_text(TITLE, FB42, W-80, d1)
          ty = 840
          for line in title_lines[:4]:
              bbox = d1.textbbox((0,0), line, font=FB42)
              tw = bbox[2] - bbox[0]
              x = (W - tw) // 2
              d1.text((x+2, ty+2), line, font=FB42, fill=(0,0,0))
              d1.text((x, ty), line, font=FB42, fill=WHITE)
              ty += 58

          # Bottom info
          d1.rectangle([0, H-90, W, H], fill=(0,0,0,220))
          src_text = f'{SOURCE}  -  {TODAY}'
          bbox = d1.textbbox((0,0), src_text, font=FR22)
          d1.text(((W - bbox[2] + bbox[0])//2, H-72), src_text, font=FR22, fill=(200,200,200))
          swipe_text = 'Swipe up for full story >'
          bbox = d1.textbbox((0,0), swipe_text, font=FR18)
          d1.text(((W - bbox[2] + bbox[0])//2, H-42), swipe_text, font=FR18, fill=(150,150,150))

          img1.save('/tmp/frames/frame_01.jpg', 'JPEG', quality=92)
          print(f"Slide 1: {os.path.getsize('/tmp/frames/frame_01.jpg')} bytes")

          # ============================================================
          # SLIDES 2-7 - Same style as Slide 1 with image background
          # ============================================================
          LABELS = [
              'WHAT HAPPENED', 'KEY DETAIL', 'MORE DETAILS',
              'WHY IT MATTERS', 'REACTION', "WHAT'S NEXT"
          ]

          # Only use sentences that have real content (not empty)
          # No fallback "developing" text - use headline-based content instead
          REAL_FALLBACKS = [
              f'{TITLE} - More details are now emerging as the story develops.',
              f'{SOURCE} reports: The situation surrounding this story continues to evolve.',
              f'Key facts have been confirmed by multiple news sources including {SOURCE}.',
              f'This story is expected to have major implications for those involved.',
              f'Public and official reactions are now coming in regarding this development.',
              f'Stay tuned to OH BOY NEWS for the latest updates on this breaking story.',
          ]

          for i in range(6):
              sn = i + 2
              label = LABELS[i]
              # Use real sentence if available and not empty, else use title-based fallback
              text = SENTENCES[i] if SENTENCES[i] and len(SENTENCES[i]) > 20 else REAL_FALLBACKS[i]
              progress = int((i + 1) * W / 7)
              print(f"Creating slide {sn}: {label}")

              img = make_slide_with_bg([], sn)
              d = ImageDraw.Draw(img)

              # Top accent bar
              d.rectangle([0, 0, W, 6], fill=ACCENT)

              # Nav bar
              d.rectangle([0, 0, W, 80], fill=(0,0,0,220))

              # OH BOY NEWS centered
              bbox = d.textbbox((0,0), 'OH BOY NEWS', font=FB28)
              d.text(((W-bbox[2]+bbox[0])//2, 22), 'OH BOY NEWS', font=FB28, fill=WHITE)

              # Slide counter
              cnt = f'{sn}/8'
              bbox_cnt = d.textbbox((0,0), cnt, font=FR18)
              d.text((W-bbox_cnt[2]-15, 28), cnt, font=FR18, fill=GRAY)

              # Label badge - centered
              bbox = d.textbbox((0,0), label, font=FB22)
              bw = bbox[2] - bbox[0] + 40
              bx = (W - bw) // 2
              draw_rounded_rect(d, [bx, 100, bx+bw, 146], 6, ACCENT)
              d.text((bx+20, 112), label, font=FB22, fill=WHITE)

              # Accent line centered
              d.rectangle([(W-120)//2, 158, (W+120)//2, 164], fill=ACCENT)

              # Body text - CENTERED
              lines = wrap_text(text, FR40, W-80, d)
              ty = 200
              for line in lines[:8]:
                  bbox = d.textbbox((0,0), line, font=FR40)
                  tw = bbox[2] - bbox[0]
                  x = (W - tw) // 2
                  # Shadow
                  d.text((x+2, ty+2), line, font=FR40, fill=(0,0,0))
                  d.text((x, ty), line, font=FR40, fill=WHITE)
                  ty += 54

              # Source centered bottom
              d.rectangle([0, H-65, W, H], fill=(0,0,0,220))
              bbox = d.textbbox((0,0), SOURCE, font=FR18)
              d.text(((W-bbox[2]+bbox[0])//2, H-45), SOURCE, font=FR18, fill=GRAY)

              # Progress bar
              d.rectangle([0, H-8, W, H], fill=(40,40,40))
              d.rectangle([0, H-8, progress, H], fill=ACCENT)

              img.save(f'/tmp/frames/frame_0{sn}.jpg', 'JPEG', quality=92)
              print(f"Slide {sn}: {os.path.getsize(f'/tmp/frames/frame_0{sn}.jpg')} bytes")

          # ============================================================
          # SLIDE 8 - CTA with image
          # ============================================================
          print("Creating slide 8...")
          img8 = make_slide_with_bg([], 8)
          d8 = ImageDraw.Draw(img8)

          # OH BOY
          try:
              f_huge = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf', 90)
              f_sub  = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf', 34)
              f_hash = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf', 26)
          except:
              f_huge = FB52
              f_sub  = FR28
              f_hash = FR22

          for text, font, fill, y in [
              ('OH BOY', f_huge, WHITE, 370),
              ('NEWS', f_huge, ACCENT, 470),
          ]:
              bbox = d8.textbbox((0,0), text, font=font)
              x = (W - (bbox[2]-bbox[0])) // 2
              d8.text((x+3, y+3), text, font=font, fill=(0,0,0))
              d8.text((x, y), text, font=font, fill=fill)

          # Line
          d8.rectangle([(W-200)//2, 585, (W+200)//2, 591], fill=ACCENT)

          # Subscribe
          sub = 'SUBSCRIBE for daily breaking news!'
          bbox = d8.textbbox((0,0), sub, font=f_sub)
          d8.text(((W-(bbox[2]-bbox[0]))//2, 615), sub, font=f_sub, fill=WHITE)

          # Hashtags
          ht = '#Shorts  #BreakingNews  #News'
          bbox = d8.textbbox((0,0), ht, font=f_hash)
          d8.text(((W-(bbox[2]-bbox[0]))//2, 680), ht, font=f_hash, fill=(200,200,200))

          img8.save('/tmp/frames/frame_08.jpg', 'JPEG', quality=92)
          print(f"Slide 8: {os.path.getsize('/tmp/frames/frame_08.jpg')} bytes")

          print("\nALL FRAMES:")
          import glob
          for f in sorted(glob.glob('/tmp/frames/*.jpg')):
              print(f"  {f}: {os.path.getsize(f)} bytes")
          PYEOF
          echo "Python done!"

      - name: Create MP4 with FFmpeg
        run: |
          > /tmp/frames.txt
          echo "file '/tmp/frames/frame_01.jpg'" >> /tmp/frames.txt
          echo "duration 3" >> /tmp/frames.txt
          for i in 2 3 4 5 6 7; do
            echo "file '/tmp/frames/frame_0${i}.jpg'" >> /tmp/frames.txt
            echo "duration 3" >> /tmp/frames.txt
          done
          echo "file '/tmp/frames/frame_08.jpg'" >> /tmp/frames.txt
          echo "duration 3" >> /tmp/frames.txt
          echo "file '/tmp/frames/frame_08.jpg'" >> /tmp/frames.txt

          MSIZE=$(stat -c%s /tmp/audio/bg_music.mp3 2>/dev/null || echo 0)

          if [ "$MSIZE" -gt 1000 ]; then
            ffmpeg -y \
              -f concat -safe 0 -i /tmp/frames.txt \
              -stream_loop -1 -i /tmp/audio/bg_music.mp3 \
              -vf "scale=720:1280:force_original_aspect_ratio=decrease,pad=720:1280:(ow-iw)/2:(oh-ih)/2:black,setsar=1,fps=25" \
              -c:v libx264 -preset fast -crf 22 -pix_fmt yuv420p \
              -c:a aac -b:a 128k \
              -af "volume=0.35,afade=t=out:st=21:d=3" \
              -shortest -movflags +faststart \
              /tmp/output/video.mp4
          else
            ffmpeg -y \
              -f concat -safe 0 -i /tmp/frames.txt \
              -vf "scale=720:1280:force_original_aspect_ratio=decrease,pad=720:1280:(ow-iw)/2:(oh-ih)/2:black,setsar=1,fps=25" \
              -c:v libx264 -preset fast -crf 22 -pix_fmt yuv420p \
              -movflags +faststart \
              /tmp/output/video.mp4
          fi

          echo "Video: $(stat -c%s /tmp/output/video.mp4) bytes"

      - name: Get YouTube Access Token
        id: yt_token
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.YT_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.YT_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.YT_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          echo "Response: $RESPONSE"
          ACCESS_TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
          if [ -z "$ACCESS_TOKEN" ]; then echo "ERROR!"; exit 1; fi
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT
          echo "Got token!"

      - name: Upload to YouTube
        id: yt_upload
        run: |
          ACCESS_TOKEN="${{ steps.yt_token.outputs.access_token }}"
          VIDEO_PATH="/tmp/output/video.mp4"
          VIDEO_SIZE=$(stat -c%s "$VIDEO_PATH")
          TITLE="${{ github.event.inputs.title }}"
          YT_TITLE="${TITLE:0:90} #Shorts"

          python3 << 'METAEOF'
          import json, os
          title = os.environ.get('YT_TITLE_VAR', 'OH BOY NEWS #Shorts')
          meta = {
              "snippet": {
                  "title": title[:100],
                  "description": f"Breaking News!\n\nSubscribe for daily breaking news!\n\n#Shorts #BreakingNews #News #OHBOYNews",
                  "tags": ["Shorts","Breaking News","News","OH BOY News"],
                  "categoryId": "25"
              },
              "status": {
                  "privacyStatus": "public",
                  "selfDeclaredMadeForKids": False
              }
          }
          with open('/tmp/metadata.json','w') as f:
              json.dump(meta, f)
          print("Metadata OK!")
          METAEOF

          # Simpler metadata approach
          cat > /tmp/metadata.json << JSONEOF
          {
            "snippet": {
              "title": "${YT_TITLE:0:100}",
              "description": "Breaking News! Subscribe for daily updates!\n\n#Shorts #BreakingNews #News #OHBOYNews",
              "tags": ["Shorts","Breaking News","News","OH BOY News"],
              "categoryId": "25"
            },
            "status": {
              "privacyStatus": "public",
              "selfDeclaredMadeForKids": false
            }
          }
          JSONEOF

          curl -s -D /tmp/headers.txt -X POST \
            "https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json; charset=UTF-8" \
            -H "X-Upload-Content-Type: video/mp4" \
            -H "X-Upload-Content-Length: $VIDEO_SIZE" \
            -d @/tmp/metadata.json

          UPLOAD_URL=$(grep -i "^location:" /tmp/headers.txt | tr -d '\r\n' | sed 's/[Ll]ocation: //')
          if [ -z "$UPLOAD_URL" ]; then
            echo "No upload URL!"
            cat /tmp/headers.txt
            exit 1
          fi

          RESULT=$(curl -s -X PUT "$UPLOAD_URL" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: video/mp4" \
            -H "Content-Length: $VIDEO_SIZE" \
            --data-binary @"$VIDEO_PATH")

          echo "Result: $RESULT"
          VIDEO_ID=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)

          if [ -z "$VIDEO_ID" ]; then
            echo "Upload failed!"
            exit 1
          fi

          echo "video_id=$VIDEO_ID" >> $GITHUB_OUTPUT
          echo "yt_url=https://www.youtube.com/shorts/$VIDEO_ID" >> $GITHUB_OUTPUT
          echo "SUCCESS! https://www.youtube.com/shorts/$VIDEO_ID"

      - name: Notify WordPress success
        if: success()
        run: |
          curl -s -X POST "${{ github.event.inputs.callback_url }}" \
            -d "post_id=${{ github.event.inputs.post_id }}" \
            -d "video_id=${{ steps.yt_upload.outputs.video_id }}" \
            -d "yt_url=${{ steps.yt_upload.outputs.yt_url }}" \
            -d "status=success"

      - name: Notify WordPress failure
        if: failure()
        run: |
          curl -s -X POST "${{ github.event.inputs.callback_url }}" \
            -d "post_id=${{ github.event.inputs.post_id }}" \
            -d "status=failed"
