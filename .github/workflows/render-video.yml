name: Render Video and Upload to YouTube

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: 'WordPress Post ID'
        required: true
      title:
        description: 'Video Title'
        required: true
      source:
        description: 'News Source'
        required: true
      topic:
        description: 'News Topic'
        required: true
      sentence1:
        description: 'Sentence 1'
        required: false
      sentence2:
        description: 'Sentence 2'
        required: false
      sentence3:
        description: 'Sentence 3'
        required: false
      sentence4:
        description: 'Sentence 4'
        required: false
      sentence5:
        description: 'Sentence 5'
        required: false
      sentence6:
        description: 'Sentence 6'
        required: false
      image_url:
        description: 'Background Image URL'
        required: false
      callback_url:
        description: 'WordPress callback URL'
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg imagemagick python3 fonts-dejavu-core wget
          ffmpeg -version | head -1
          convert -version | head -1
          echo "Done!"

      - name: Fix ImageMagick policy
        run: |
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/rights="none" pattern="EPS"/rights="read|write" pattern="EPS"/' /etc/ImageMagick-6/policy.xml || true
          # Remove memory limits that cause failures
          sudo sed -i 's/<policy domain="resource" name="memory" value="[^"]*"\/>/<policy domain="resource" name="memory" value="2GiB"\/>/' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/<policy domain="resource" name="map" value="[^"]*"\/>/<policy domain="resource" name="map" value="4GiB"\/>/' /etc/ImageMagick-6/policy.xml || true
          echo "ImageMagick policy fixed!"

      - name: Generate background music
        run: |
          mkdir -p /tmp/audio
          echo "Generating copyright-free background music..."
          ffmpeg -y -f lavfi \
            -i "aevalsrc=0.2*sin(330*2*PI*t)+0.15*sin(660*2*PI*t)+0.1*sin(990*2*PI*t)+0.05*sin(1320*2*PI*t):s=44100" \
            -t 35 \
            -af "afade=t=in:st=0:d=3,afade=t=out:st=32:d=3,volume=0.6" \
            /tmp/audio/bg_music.mp3 -y 2>/dev/null
          echo "Music generated: $(stat -c%s /tmp/audio/bg_music.mp3) bytes"

      - name: Create video frames
        run: |
          mkdir -p /tmp/frames /tmp/output

          TITLE="${{ github.event.inputs.title }}"
          SOURCE="${{ github.event.inputs.source }}"
          TOPIC="${{ github.event.inputs.topic }}"
          IMAGE_URL="${{ github.event.inputs.image_url }}"
          TODAY=$(date '+%b %d, %Y')

          FONT_BOLD="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          FONT_REG="/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf"

          # Topic colors
          case "$TOPIC" in
            "Breaking News") ACCENT="#c8102e" DARK="#0d0508" ;;
            "Politics") ACCENT="#1a5fb4" DARK="#080d1a" ;;
            "Entertainment") ACCENT="#9141ac" DARK="#0d080f" ;;
            "Sports") ACCENT="#26a269" DARK="#05120a" ;;
            "Technology") ACCENT="#1c71d8" DARK="#080d1a" ;;
            "Business") ACCENT="#e5a50a" DARK="#120e02" ;;
            "World") ACCENT="#c64600" DARK="#120800" ;;
            *) ACCENT="#c8102e" DARK="#0d0508" ;;
          esac

          echo "Title: $TITLE"
          echo "Topic: $TOPIC | Accent: $ACCENT"

          # Download background image
          BG_OK=false
          if [ -n "$IMAGE_URL" ]; then
            curl -s -L --max-time 15 --retry 2 \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0" \
              -o /tmp/bg_raw.jpg "$IMAGE_URL" 2>/dev/null
            if [ -f /tmp/bg_raw.jpg ] && [ $(stat -c%s /tmp/bg_raw.jpg 2>/dev/null || echo 0) -gt 5000 ]; then
              convert /tmp/bg_raw.jpg \
                -resize 720x1280^ \
                -gravity Center \
                -extent 720x1280 \
                /tmp/bg_ready.jpg 2>/dev/null && BG_OK=true
              echo "Background image ready!"
            fi
          fi

          # =====================
          # SLIDE 1 - HEADLINE
          # =====================
          echo "Creating slide 1..."

          # Create base - with image or gradient
          if [ "$BG_OK" = true ]; then
            convert /tmp/bg_ready.jpg \
              -fill "rgba(0,0,0,0.35)" -draw "rectangle 0,0 720,1280" \
              /tmp/slide1_base.jpg
          else
            convert -size 720x1280 gradient:"${ACCENT}"-"${DARK}" \
              -fill "rgba(0,0,0,0.3)" -draw "rectangle 0,0 720,1280" \
              /tmp/slide1_base.jpg
          fi

          # Top bar
          convert /tmp/slide1_base.jpg \
            -fill "rgba(0,0,0,0.9)" -draw "rectangle 0,0 720,90" \
            /tmp/slide1_base.jpg

          # OH BOY NEWS text top
          convert /tmp/slide1_base.jpg \
            -font "$FONT_BOLD" -pointsize 32 \
            -fill "#ffffff" \
            -draw "text 20,58 'OH BOY NEWS'" \
            /tmp/slide1_base.jpg

          # Topic badge
          BADGE_W=$((${#TOPIC} * 17 + 40))
          convert /tmp/slide1_base.jpg \
            -fill "$ACCENT" \
            -draw "roundrectangle 40,780 $((40+BADGE_W)),825 8,8" \
            -font "$FONT_BOLD" -pointsize 22 \
            -fill "#ffffff" \
            -draw "text 55,810 '$(echo $TOPIC | tr '[:lower:]' '[:upper:]')'" \
            /tmp/slide1_base.jpg

          # Headline text - white on transparent background
          convert -background none \
            -fill "#ffffff" \
            -font "$FONT_BOLD" \
            -pointsize 44 \
            -size 640x260 \
            caption:"$TITLE" \
            /tmp/title_text.png

          # Merge headline onto base
          convert /tmp/slide1_base.jpg \
            /tmp/title_text.png \
            -geometry +40+840 \
            -composite \
            /tmp/slide1_base.jpg

          # Source and date
          convert /tmp/slide1_base.jpg \
            -font "$FONT_REG" -pointsize 24 \
            -fill "#cccccc" \
            -draw "text 40,1165 '$SOURCE  -  $TODAY'" \
            -fill "#999999" -pointsize 20 \
            -draw "text 40,1215 'Swipe up for full story'" \
            /tmp/frames/frame_01.jpg

          echo "Slide 1 done: $(stat -c%s /tmp/frames/frame_01.jpg) bytes"

          # Sentences
          S1="${{ github.event.inputs.sentence1 }}"
          S2="${{ github.event.inputs.sentence2 }}"
          S3="${{ github.event.inputs.sentence3 }}"
          S4="${{ github.event.inputs.sentence4 }}"
          S5="${{ github.event.inputs.sentence5 }}"
          S6="${{ github.event.inputs.sentence6 }}"

          LABELS=("WHAT HAPPENED" "KEY DETAIL" "MORE DETAILS" "WHY IT MATTERS" "REACTION" "WHATS NEXT")
          FALLBACKS=(
            "This story is developing. More details emerging from $SOURCE."
            "According to $SOURCE this is one of the most important stories right now."
            "Multiple outlets have confirmed the key facts of this report."
            "The story has significant implications for global audiences."
            "Reactions from officials and the public are now coming in."
            "Further developments expected in the coming hours."
          )
          SENTENCES=("$S1" "$S2" "$S3" "$S4" "$S5" "$S6")

          # ========================
          # SLIDES 2-7 - DARK BG + WHITE TEXT
          # ========================
          for i in 0 1 2 3 4 5; do
            SLIDE_NUM=$((i + 2))
            LABEL="${LABELS[$i]}"
            TEXT="${SENTENCES[$i]}"
            if [ -z "$TEXT" ]; then
              TEXT="${FALLBACKS[$i]}"
            fi
            PROGRESS=$(( (i + 1) * 720 / 7 ))
            FNAME="frame_0${SLIDE_NUM}.jpg"

            echo "Creating slide $SLIDE_NUM: $LABEL"

            # Dark base
            convert -size 720x1280 xc:"#0d0d0d" /tmp/slide_base.jpg

            # Accent top bar
            convert /tmp/slide_base.jpg \
              -fill "$ACCENT" \
              -draw "rectangle 0,0 720,6" \
              /tmp/slide_base.jpg

            # Top nav bar
            convert /tmp/slide_base.jpg \
              -fill "rgba(0,0,0,0.95)" \
              -draw "rectangle 0,0 720,80" \
              /tmp/slide_base.jpg

            # OH BOY NEWS
            convert /tmp/slide_base.jpg \
              -font "$FONT_BOLD" -pointsize 28 \
              -fill "#ffffff" \
              -draw "text 20,52 'OH BOY NEWS'" \
              -font "$FONT_REG" -pointsize 22 \
              -fill "#888888" \
              -draw "text 580,52 '${SLIDE_NUM}/8'" \
              /tmp/slide_base.jpg

            # Label badge
            BADGE_W=$((${#LABEL} * 15 + 30))
            convert /tmp/slide_base.jpg \
              -fill "$ACCENT" \
              -draw "roundrectangle 40,105 $((40+BADGE_W)),150 6,6" \
              -font "$FONT_BOLD" -pointsize 20 \
              -fill "#ffffff" \
              -draw "text 55,138 '$LABEL'" \
              /tmp/slide_base.jpg

            # Accent line
            convert /tmp/slide_base.jpg \
              -fill "$ACCENT" \
              -draw "rectangle 40,165 160,171" \
              /tmp/slide_base.jpg

            # Body text - WHITE on TRANSPARENT background
            convert -background none \
              -fill "#ffffff" \
              -font "$FONT_REG" \
              -pointsize 36 \
              -size 640x900 \
              caption:"$TEXT" \
              /tmp/body_text.png

            # Merge text onto slide
            convert /tmp/slide_base.jpg \
              /tmp/body_text.png \
              -geometry +40+185 \
              -composite \
              /tmp/slide_base.jpg

            # Bottom bar + source
            convert /tmp/slide_base.jpg \
              -fill "rgba(0,0,0,0.95)" \
              -draw "rectangle 0,1215 720,1280" \
              -font "$FONT_REG" -pointsize 20 \
              -fill "#888888" \
              -draw "text 40,1248 '$SOURCE'" \
              /tmp/slide_base.jpg

            # Progress bar
            convert /tmp/slide_base.jpg \
              -fill "#333333" \
              -draw "rectangle 0,1272 720,1278" \
              -fill "$ACCENT" \
              -draw "rectangle 0,1272 ${PROGRESS},1278" \
              /tmp/frames/$FNAME

            echo "Slide $SLIDE_NUM done: $(stat -c%s /tmp/frames/$FNAME) bytes"
          done

          # ========================
          # SLIDE 8 - CTA
          # ========================
          echo "Creating slide 8..."
          convert -size 720x1280 gradient:"${ACCENT}"-"${DARK}" \
            -fill "rgba(0,0,0,0.5)" \
            -draw "rectangle 0,0 720,1280" \
            /tmp/slide8_base.jpg

          # OH BOY NEWS big text
          convert -background none \
            -fill "#ffffff" \
            -font "$FONT_BOLD" \
            -pointsize 90 \
            -gravity Center \
            -size 680x200 \
            caption:"OH BOY NEWS" \
            /tmp/cta_title.png

          convert /tmp/slide8_base.jpg \
            /tmp/cta_title.png \
            -gravity Center \
            -geometry +0-200 \
            -composite \
            /tmp/slide8_base.jpg

          # Subscribe text
          convert -background none \
            -fill "#ffffff" \
            -font "$FONT_REG" \
            -pointsize 38 \
            -gravity Center \
            -size 680x100 \
            caption:"SUBSCRIBE for daily breaking news!" \
            /tmp/cta_sub.png

          convert /tmp/slide8_base.jpg \
            /tmp/cta_sub.png \
            -gravity Center \
            -geometry +0+50 \
            -composite \
            /tmp/slide8_base.jpg

          # Hashtags
          convert /tmp/slide8_base.jpg \
            -font "$FONT_REG" -pointsize 26 \
            -fill "rgba(255,255,255,0.7)" \
            -gravity Center \
            -annotate +0+180 "#Shorts #BreakingNews #News" \
            /tmp/frames/frame_08.jpg

          echo "Slide 8 done: $(stat -c%s /tmp/frames/frame_08.jpg) bytes"

          echo "ALL FRAMES DONE:"
          ls -lh /tmp/frames/

      - name: Create MP4 with FFmpeg and music
        run: |
          > /tmp/frames.txt
          echo "file '/tmp/frames/frame_01.jpg'" >> /tmp/frames.txt
          echo "duration 3" >> /tmp/frames.txt
          for i in 2 3 4 5 6 7 8; do
            echo "file '/tmp/frames/frame_0${i}.jpg'" >> /tmp/frames.txt
            echo "duration 3" >> /tmp/frames.txt
          done
          echo "file '/tmp/frames/frame_08.jpg'" >> /tmp/frames.txt

          echo "Creating MP4 with music..."
          ffmpeg -y \
            -f concat -safe 0 -i /tmp/frames.txt \
            -stream_loop -1 -i /tmp/audio/bg_music.mp3 \
            -vf "scale=720:1280:force_original_aspect_ratio=decrease,pad=720:1280:(ow-iw)/2:(oh-ih)/2:black,setsar=1,fps=25" \
            -c:v libx264 -preset fast -crf 22 -pix_fmt yuv420p \
            -c:a aac -b:a 128k \
            -af "volume=0.5,afade=t=out:st=22:d=2" \
            -shortest \
            -movflags +faststart \
            /tmp/output/video.mp4

          echo "Video ready:"
          ls -lh /tmp/output/video.mp4

      - name: Get YouTube Access Token
        id: yt_token
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.YT_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.YT_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.YT_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          echo "Response: $RESPONSE"
          ACCESS_TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERROR: No access token!"
            exit 1
          fi
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT
          echo "Got YouTube token!"

      - name: Upload to YouTube
        id: yt_upload
        run: |
          ACCESS_TOKEN="${{ steps.yt_token.outputs.access_token }}"
          TITLE="${{ github.event.inputs.title }}"
          VIDEO_PATH="/tmp/output/video.mp4"
          VIDEO_SIZE=$(stat -c%s "$VIDEO_PATH")
          YT_TITLE="${TITLE:0:90} #Shorts"

          cat > /tmp/metadata.json << METAEOF
          {
            "snippet": {
              "title": "$YT_TITLE",
              "description": "$TITLE\n\nSubscribe for daily breaking news!\n\n#Shorts #BreakingNews #News #OHBOYNews",
              "tags": ["Shorts", "Breaking News", "News", "OH BOY News"],
              "categoryId": "25"
            },
            "status": {
              "privacyStatus": "public",
              "selfDeclaredMadeForKids": false
            }
          }
          METAEOF

          curl -s -D /tmp/headers.txt -X POST \
            "https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json; charset=UTF-8" \
            -H "X-Upload-Content-Type: video/mp4" \
            -H "X-Upload-Content-Length: $VIDEO_SIZE" \
            -d @/tmp/metadata.json

          UPLOAD_URL=$(grep -i "^location:" /tmp/headers.txt | tr -d '\r\n' | sed 's/[Ll]ocation: //')
          if [ -z "$UPLOAD_URL" ]; then
            echo "No upload URL!"
            cat /tmp/headers.txt
            exit 1
          fi

          RESULT=$(curl -s -X PUT "$UPLOAD_URL" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: video/mp4" \
            -H "Content-Length: $VIDEO_SIZE" \
            --data-binary @"$VIDEO_PATH")

          echo "Result: $RESULT"
          VIDEO_ID=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)

          if [ -z "$VIDEO_ID" ]; then
            echo "Upload failed!"
            exit 1
          fi

          echo "video_id=$VIDEO_ID" >> $GITHUB_OUTPUT
          echo "yt_url=https://www.youtube.com/shorts/$VIDEO_ID" >> $GITHUB_OUTPUT
          echo "SUCCESS! https://www.youtube.com/shorts/$VIDEO_ID"

      - name: Notify WordPress success
        if: success()
        run: |
          curl -s -X POST "${{ github.event.inputs.callback_url }}" \
            -d "post_id=${{ github.event.inputs.post_id }}" \
            -d "video_id=${{ steps.yt_upload.outputs.video_id }}" \
            -d "yt_url=${{ steps.yt_upload.outputs.yt_url }}" \
            -d "status=success"
          echo "WordPress notified!"

      - name: Notify WordPress failure
        if: failure()
        run: |
          curl -s -X POST "${{ github.event.inputs.callback_url }}" \
            -d "post_id=${{ github.event.inputs.post_id }}" \
            -d "status=failed"
          echo "WordPress notified - failed!"
